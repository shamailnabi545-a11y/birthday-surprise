<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="stars"></canvas>

<!-- HEART EXPLOSION -->
<div id="heartContainer"></div>

<!-- START -->
<div id="startScreen">
<h1 class="startTitle">For Someone Special ❤️</h1>
<p class="startSub">I made something for you…</p>
<button class="startBtn" onclick="startSurprise()">Start Surprise ✨</button>
</div>

<!-- MAIN -->
<div id="mainPage">
<h1 class="title">Happy Birthday My Love Aysha ❤️</h1>

<div class="slideshow">
<img id="slideImage">
<div id="slideText"></div>
</div>
</div>

<!-- GIFT -->
<div id="giftPage">
<div class="giftBox" onclick="openGift()">🎁</div>
<p>Tap the gift 🎁</p>
</div>

<!-- MAGIC CAKE PAGE -->
<div id="magicPage">
<h1 class="magicTitle">Magical Cake Time! ✨</h1>

<div class="cake">🎂</div>

<button class="magicBtn" onclick="startMagic()">Begin Magic ✨</button>
</div>

<!-- FIREWORK PAGE -->
<div id="fireworkPage">
<h1 class="fireText">Happy Birthday My Love ❤️</h1>
<canvas id="fireworksCanvas"></canvas>
</div>

<!-- FINAL -->
<div id="finalPage">
<h1 class="finalTitle">Happy Birthday My Love ❤️</h1>
<p class="finalMsg">
You are the most special person in my life.<br><br>
I wish your life is always full of happiness.<br><br>
I love you forever ❤️
</p>
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<script src="script.js"></script>

</body>
</html>
